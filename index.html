<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keeru Media Player</title>
    
    <!-- Core Video Engine -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --keeru-blue: #4cc9ff;
            --keeru-glow: rgba(76, 201, 255, 0.5);
            /* Subtitle Precision */
            --cue-size: 1.35em;
            --cue-weight: 600;
            --cue-color: #ffffff;
            --cue-shadow: rgba(0, 0, 0, 1);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* =========================================
           ULTIMATE CINEMATIC PLAYER ARCHITECTURE
           ========================================= */
        .video-js {
            width: 100% !important;
            height: 100% !important;
            background-color: #000 !important;
        }

        /* EXACT CUSTOM FLOATING CAPSULE (Desktop Default) */
        .vjs-vlc-skin .vjs-control-bar {
            display: block !important;
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
            border-radius: 16px !important;
            height: 100px !important;
            bottom: 15px !important;
            left: 30px !important;
            right: 30px !important;
            width: auto !important;
            z-index: 100;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
            box-shadow: none !important;
        }

        /* PROGRESS BAR HUGGING THE INSIDE TOP EDGE */
        .vjs-vlc-skin .vjs-progress-control {
            position: absolute !important;
            top: 4px !important;
            left: 20px !important;
            right: 20px !important;
            width: auto !important;
            height: 4px !important;
            transition: all 0.2s ease !important;
            z-index: 110 !important;
        }
        .vjs-vlc-skin .vjs-progress-control:hover { height: 6px !important; }
        .vjs-vlc-skin .vjs-play-progress {
            background: linear-gradient(90deg, #1e5eff, var(--keeru-blue)) !important;
            box-shadow: 0 0 10px var(--keeru-glow);
            border-radius: 4px;
        }
        .vjs-vlc-skin .vjs-play-progress:before { display: none !important; }

        /* =========================================
           SMART INTERACTIVE CONTROLS (Desktop Positions)
           ========================================= */
        
        .vjs-vlc-skin .vjs-play-control { 
            position: absolute !important; 
            top: 15px !important; left: 20px !important; 
            width: 44px !important; height: 44px !important; 
            border-radius: 50% !important; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important; 
        }
        .vjs-vlc-skin .vjs-play-control:hover { 
            background: rgba(255,255,255,0.08) !important; 
            color: var(--keeru-blue) !important; 
            box-shadow: 0 0 15px rgba(76,201,255,0.2) !important; 
            transform: scale(1.05) !important;
        }

        .vjs-vlc-skin .vjs-volume-panel { 
            position: absolute !important; 
            top: 15px !important; left: 70px !important; 
            width: 44px !important; height: 44px !important; 
            display: flex !important; align-items: center !important;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s ease, box-shadow 0.4s ease !important;
            border-radius: 22px !important; overflow: hidden !important;
        }
        .vjs-vlc-skin .vjs-volume-panel:hover {
            width: 140px !important;
            background: rgba(255, 255, 255, 0.08) !important;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02) !important;
        }

        .vjs-vlc-skin .vjs-mute-control {
            width: 44px !important; height: 44px !important; z-index: 2 !important;
            transition: color 0.3s ease, text-shadow 0.3s ease !important;
        }
        .vjs-vlc-skin .vjs-volume-panel:hover .vjs-mute-control {
            color: var(--keeru-blue) !important; text-shadow: 0 0 12px var(--keeru-glow) !important;
        }

        .vjs-vlc-skin .vjs-volume-control.vjs-volume-horizontal {
            width: 80px !important; opacity: 0 !important; visibility: visible !important;
            display: flex !important; align-items: center !important;
            transform: translateX(-20px) !important; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
            margin-left: -5px !important; pointer-events: none !important;
        }
        .vjs-vlc-skin .vjs-volume-panel:hover .vjs-volume-control {
            opacity: 1 !important; transform: translateX(0) !important; pointer-events: auto !important;
        }

        .vjs-vlc-skin .vjs-volume-bar { margin: 0 !important; width: 100% !important; height: 4px !important; border-radius: 4px !important; background: rgba(255,255,255,0.2) !important; }
        .vjs-vlc-skin .vjs-volume-level { background: linear-gradient(90deg, #1e5eff, var(--keeru-blue)) !important; border-radius: 4px !important; box-shadow: 0 0 10px var(--keeru-glow) !important; }
        .vjs-vlc-skin .vjs-volume-level:before {
            content: "" !important; width: 12px !important; height: 12px !important; background: #fff !important;
            border-radius: 50% !important; top: -4px !important; right: -6px !important; position: absolute !important;
            box-shadow: 0 0 8px var(--keeru-blue) !important; opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important; transform: scale(0.5);
        }
        .vjs-vlc-skin .vjs-volume-panel:hover .vjs-volume-level:before { opacity: 1; transform: scale(1); }

        .vjs-vlc-skin .vjs-current-time { 
            position: absolute !important; top: 25px !important; left: 125px !important; 
            display: block !important; padding: 0 !important; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        .vjs-vlc-skin .vjs-control-bar:has(.vjs-volume-panel:hover) .vjs-current-time { transform: translateX(95px) !important; }

        .vjs-vlc-skin .vjs-fullscreen-control { position: absolute !important; top: auto !important; bottom: 15px !important; right: 25px !important; width: 44px !important; height: 44px !important; display: flex !important; align-items: center; justify-content: center; border-radius: 50% !important; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important; }
        .vjs-btn-speed { position: absolute !important; bottom: 15px !important; right: 75px !important; }
        .vjs-btn-subs { position: absolute !important; bottom: 15px !important; right: 125px !important; }
        .vjs-btn-audio { position: absolute !important; bottom: 15px !important; right: 175px !important; }
        .vjs-btn-pip { position: absolute !important; bottom: 15px !important; right: 225px !important; }
        .vjs-btn-theme { position: absolute !important; bottom: 15px !important; right: 275px !important; }
        .vjs-custom-divider { position: absolute !important; bottom: 25px !important; right: 320px !important; font-size: 16px; color: rgba(255,255,255,0.3); font-weight: bold; pointer-events: none; }
        .vjs-btn-forward { position: absolute !important; bottom: 15px !important; right: 350px !important; }
        .vjs-btn-rewind { position: absolute !important; bottom: 15px !important; right: 400px !important; }

        .vjs-button > .vjs-icon-placeholder:before { font-size: 1.9em !important; line-height: 2 !important; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important; }
        .vjs-keeru-btn, .vjs-vlc-skin .vjs-fullscreen-control { width: 44px !important; height: 44px !important; border-radius: 50% !important; cursor: pointer; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important; display: flex !important; align-items: center; justify-content: center; border: 1px solid transparent !important; }
        .vjs-keeru-btn svg, .vjs-vlc-skin .vjs-fullscreen-control svg { width: 22px; height: 22px; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .vjs-keeru-btn:hover, .vjs-vlc-skin .vjs-fullscreen-control:hover { background: rgba(255,255,255,0.08) !important; border: 1px solid rgba(255,255,255,0.15) !important; color: var(--keeru-blue) !important; transform: translateY(-4px) scale(1.05) !important; box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 20px rgba(76,201,255,0.2) !important; }
        .vjs-keeru-btn:active, .vjs-vlc-skin .vjs-fullscreen-control:active { transform: translateY(0) scale(0.95) !important; box-shadow: 0 0 5px rgba(76,201,255,0.4) !important; background: rgba(255,255,255,0.12) !important; }

        .vjs-btn-rewind:hover svg { transform: translateX(-3px); }
        .vjs-btn-forward:hover svg { transform: translateX(3px); }
        .vjs-btn-speed:hover svg { transform: rotate(45deg); }
        .vjs-btn-theme:hover svg { transform: rotate(20deg) scale(1.1); }
        .vjs-btn-audio:hover svg { transform: scale(1.1) rotate(-5deg); }
        .vjs-btn-subs:hover svg { transform: scale(1.1) translateY(-2px); }
        .vjs-vlc-skin .vjs-fullscreen-control:hover .vjs-icon-placeholder:before { transform: scale(1.15); }

        /* Cinematic Tooltips */
        .vjs-vlc-skin .vjs-control-text { position: absolute !important; top: -45px !important; left: 50% !important; transform: translateX(-50%) translateY(10px) scale(0.9) !important; background: rgba(15, 15, 20, 0.95) !important; backdrop-filter: blur(10px) !important; -webkit-backdrop-filter: blur(10px) !important; color: #fff !important; font-size: 10px !important; font-family: 'Plus Jakarta Sans', sans-serif !important; font-weight: 800 !important; letter-spacing: 1.5px !important; padding: 8px 14px !important; border-radius: 10px !important; border: 1px solid rgba(255, 255, 255, 0.15) !important; opacity: 0 !important; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) !important; clip: auto !important; width: auto !important; height: auto !important; pointer-events: none !important; text-transform: uppercase !important; box-shadow: 0 10px 25px rgba(0,0,0,0.6), 0 0 15px rgba(76,201,255,0.1) !important; z-index: 200 !important; white-space: nowrap !important; }
        .vjs-keeru-btn:hover .vjs-control-text, .vjs-vlc-skin .vjs-fullscreen-control:hover .vjs-control-text, .vjs-vlc-skin .vjs-play-control:hover .vjs-control-text { opacity: 1 !important; transform: translateX(-50%) translateY(0) scale(1) !important; }

        .vjs-time-divider, .vjs-duration-display, .vjs-remaining-time { display: none !important; }
        .vjs-current-time-display { font-size: 12px !important; font-weight: 800 !important; letter-spacing: 1px; }

        .vjs-text-track-display { bottom: 125px !important; pointer-events: none !important; padding: 0 10% !important; }
        .vjs-text-track-cue > div { background-color: transparent !important; color: var(--cue-color) !important; font-size: var(--cue-size) !important; font-weight: var(--cue-weight) !important; line-height: 1.4 !important; transition: none !important; text-shadow: -1.5px -1.5px 0 var(--cue-shadow),  1.5px -1.5px 0 var(--cue-shadow), -1.5px  1.5px 0 var(--cue-shadow),  1.5px  1.5px 0 var(--cue-shadow), 0px 5px 15px var(--cue-shadow) !important; display: inline-block !important; text-align: center !important; }

        #top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%); z-index: 150; display: flex; align-items: center; padding: 0 40px; transition: all 0.4s ease; }
        .vjs-user-inactive.vjs-playing #top-bar { opacity: 0; transform: translateY(-15px); pointer-events: none; }
        .vjs-user-inactive.vjs-playing .vjs-control-bar { opacity: 0 !important; transform: translateY(25px) scale(0.98) !important; pointer-events: none !important; }

        .settings-overlay { position: absolute; bottom: 125px; right: 30px; width: 360px; background: rgba(12, 12, 18, 0.95); backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; padding: 28px; z-index: 200; display: none; box-shadow: 0 30px 80px rgba(0,0,0,1); transform-origin: bottom right; pointer-events: auto !important; }
        .settings-overlay.active { display: block; animation: slideIn 0.35s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes slideIn { from { transform: translateY(20px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(76,201,255,0.3); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(76,201,255,0.6); }

        #splash-screen { background: #000; z-index: 1000; }
        .logo-butterfly { filter: drop-shadow(0 0 45px var(--keeru-glow)); animation: butterflyHover 8s ease-in-out infinite; }
        @keyframes butterflyHover { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.02); } }

        /* =========================================
           RESPONSIVE ARCHITECTURE (Mobiles/Tablets)
           Auto-adapts layout on screens < 1024px
           ========================================= */
        @media screen and (max-width: 1024px) {
            .vjs-vlc-skin .vjs-control-bar {
                display: flex !important;
                flex-wrap: wrap !important;
                justify-content: space-evenly !important;
                align-items: center !important;
                gap: 6px !important;
                height: auto !important;
                min-height: 80px;
                padding: 35px 10px 10px 10px !important; /* Top padding clears progress bar */
                bottom: 10px !important; left: 10px !important; right: 10px !important;
            }

            /* Strip Absolute Positioning to allow Flexbox to arrange buttons correctly */
            .vjs-vlc-skin .vjs-control,
            .vjs-vlc-skin .vjs-volume-panel,
            .vjs-keeru-btn,
            .vjs-vlc-skin .vjs-fullscreen-control {
                position: relative !important;
                top: auto !important; bottom: auto !important; left: auto !important; right: auto !important;
                transform: none !important;
                pointer-events: auto !important;
            }
            
            /* Smart Time Display Injection */
            .vjs-vlc-skin .vjs-current-time {
                position: relative !important;
                top: auto !important; bottom: auto !important; left: auto !important; right: auto !important;
                transform: none !important;
                width: 100% !important; /* Forces time to its own row */
                display: flex !important;
                justify-content: center !important;
                padding-bottom: 5px !important;
                order: -1 !important; /* Locks time to top of the flex container */
                pointer-events: auto !important;
            }
            
            .vjs-vlc-skin .vjs-control-bar:has(.vjs-volume-panel:hover) .vjs-current-time { transform: none !important; }
            .vjs-custom-divider { display: none !important; }
            
            /* Icon Resizing for Mobile Touch Targets */
            .vjs-keeru-btn, .vjs-vlc-skin .vjs-fullscreen-control, .vjs-vlc-skin .vjs-play-control {
                width: 44px !important; height: 44px !important;
            }
            .vjs-keeru-btn svg, .vjs-vlc-skin .vjs-fullscreen-control svg { width: 22px; height: 22px; }
            .vjs-vlc-skin .vjs-volume-panel { width: 44px !important; height: 44px !important; }
            .vjs-vlc-skin .vjs-volume-panel:hover { width: 110px !important; } 
            
            /* Progress Bar Re-docked slightly above icons */
            .vjs-vlc-skin .vjs-progress-control {
                position: absolute !important;
                top: 0px !important; 
                left: 15px !important; 
                right: 15px !important;
                height: 25px !important; /* Huge hit box for thumbs */
                width: auto !important;
            }
            /* Inner visual line */
            .vjs-vlc-skin .vjs-progress-control .vjs-progress-holder {
                top: 50% !important;
                transform: translateY(-50%) !important;
                margin: 0 !important;
            }

            /* Responsive Overlays scaling */
            #top-bar { height: 70px; padding: 0 20px; }
            #top-bar button { width: 35px; height: 35px; }
            .settings-overlay {
                width: calc(100% - 20px) !important;
                right: 10px !important; left: 10px !important;
                bottom: 110px !important; /* Sits above mobile control bar */
                padding: 20px !important;
            }
            .vjs-text-track-display { bottom: 100px !important; }
            
            /* Suppress Hover effects & Tooltips on Touch devices */
            .vjs-keeru-btn:hover, .vjs-vlc-skin .vjs-fullscreen-control:hover { transform: none !important; box-shadow: none !important; background: transparent !important; border-color: transparent !important; }
            .vjs-vlc-skin .vjs-control-text { display: none !important; }
        }

        /* =========================================
           LIGHT MODE OVERRIDES
           ========================================= */
        body.light-mode { background-color: #f0f4f8 !important; color: #111 !important; }
        body.light-mode .vjs-vlc-skin .vjs-control-bar { background: rgba(255, 255, 255, 0.85) !important; backdrop-filter: blur(20px) !important; -webkit-backdrop-filter: blur(20px) !important; border: 1px solid rgba(0, 0, 0, 0.1) !important; box-shadow: 0 10px 30px rgba(0,0,0,0.05) !important; }
        body.light-mode .vjs-vlc-skin .vjs-volume-panel:hover { background: rgba(0, 0, 0, 0.05) !important; box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.05) !important; }
        body.light-mode .vjs-vlc-skin .vjs-volume-bar { background: rgba(0,0,0,0.2) !important; }
        body.light-mode .vjs-keeru-btn:hover, body.light-mode .vjs-vlc-skin .vjs-fullscreen-control:hover, body.light-mode .vjs-vlc-skin .vjs-play-control:hover { background: rgba(0,0,0,0.05) !important; border-color: rgba(0,0,0,0.1) !important; box-shadow: 0 10px 20px rgba(0,0,0,0.1), 0 0 20px rgba(76,201,255,0.2) !important; }
        body.light-mode .vjs-vlc-skin .vjs-control-text { background: rgba(255, 255, 255, 0.95) !important; color: #111 !important; border: 1px solid rgba(0, 0, 0, 0.1) !important; box-shadow: 0 10px 25px rgba(0,0,0,0.15) !important; }
        body.light-mode .vjs-keeru-btn svg, body.light-mode .vjs-current-time-display, body.light-mode .vjs-button > .vjs-icon-placeholder:before { color: #222 !important; text-shadow: none !important; }
        body.light-mode .vjs-custom-divider { color: rgba(0,0,0,0.2) !important; }
        body.light-mode #top-bar { background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, transparent 100%); }
        body.light-mode #top-bar button svg, body.light-mode #file-title { color: #222 !important; }
        body.light-mode #splash-screen { background: #f0f4f8 !important; }
        body.light-mode #splash-screen h1 { color: #111 !important; }
        body.light-mode .settings-overlay { background: rgba(255, 255, 255, 0.95) !important; border: 1px solid rgba(0,0,0,0.1) !important; box-shadow: 0 20px 40px rgba(0,0,0,0.1) !important; }
        body.light-mode .settings-overlay h3, body.light-mode .settings-overlay p, body.light-mode .settings-overlay span { color: #222 !important; }
        body.light-mode .settings-overlay .bg-white\/5 { background-color: rgba(0,0,0,0.05) !important; color: #111 !important; }
        body.light-mode .settings-overlay .hover\:bg-white\/10:hover { background-color: rgba(0,0,0,0.1) !important; }
    </style>
</head>
<body>

    <div id="top-bar" class="opacity-0">
        <button onclick="location.reload()" class="flex items-center justify-center rounded-full hover:bg-white/10 transition-all active:scale-90">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="flex-1 min-w-0">
            <h2 id="file-title" class="text-lg md:text-xl font-black truncate text-white/90 tracking-tight uppercase">CORE STREAM</h2>
        </div>
    </div>

    <div id="splash-screen" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 transition-opacity duration-1000">
        <div class="max-w-3xl w-full">
            <div class="logo-butterfly mb-8 md:mb-12 h-48 md:h-80">
                <svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                    <defs>
                        <radialGradient id="wingMain" cx="50%" cy="45%" r="70%">
                            <stop offset="0%" stop-color="#b9f2ff"/><stop offset="30%" stop-color="#4cc9ff"/><stop offset="60%" stop-color="#1e5eff"/><stop offset="100%" stop-color="#03045e"/>
                        </radialGradient>
                        <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="white" stop-opacity="0.8"/><stop offset="50%" stop-color="white" stop-opacity="0.1"/><stop offset="100%" stop-color="white" stop-opacity="0"/></linearGradient>
                        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#000000"/></linearGradient>
                        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="15" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    </defs>
                    <g filter="drop-shadow(0 20px 40px rgba(0,0,0,0.7))">
                        <g id="leftWing">
                            <path d="M500 350 C250 50 50 200 200 380 C100 600 350 600 500 380 Z" fill="url(#wingMain)" filter="url(#softGlow)"/>
                            <path d="M500 380 C250 550 300 680 500 550 Z" fill="url(#wingMain)" filter="url(#softGlow)"/>
                            <path d="M500 350 L300 200 M500 350 L220 380 M500 380 L320 520" stroke="#90e0ff" stroke-width="3" opacity="0.6"/>
                            <ellipse cx="330" cy="250" rx="80" ry="120" fill="url(#shine)" opacity="0.4"/>
                            <circle cx="300" cy="430" r="40" fill="#caf0ff" opacity="0.6"/>
                        </g>
                        <use href="#leftWing" transform="scale(-1,1) translate(-1000,0)" />
                        <ellipse cx="500" cy="400" rx="25" ry="170" fill="url(#bodyGrad)" />
                        <path d="M485 250 Q430 120 470 80" stroke="#89c2ff" stroke-width="4" fill="none"/><path d="M515 250 Q570 120 530 80" stroke="#89c2ff" stroke-width="4" fill="none"/>
                        <circle cx="470" cy="80" r="8" fill="#bde0fe"/><circle cx="530" cy="80" r="8" fill="#bde0fe"/>
                    </g>
                </svg>
            </div>
            <h1 class="text-5xl md:text-8xl font-black mb-12 tracking-tighter italic uppercase text-white">KEERU<span class="text-[#4cc9ff]">.MEDIA</span></h1>

                <svg class="w-4 h-4 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

    <!-- Video Area -->

            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>

        <!-- Play/Pause Feedback Indicator -->

            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>

    <input type="file" id="sub-input" class="hidden" accept=".srt,.vtt">

    <script>
        /**
         * Keeru Media Player - Responsive & Auto-Orientation Engine
         */

        const icons = {
            rewind: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg>`,
            forward: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>`,
            pip: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><rect x="12" y="12" width="7" height="5" rx="1" ry="1"/></svg>`,
            voices: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
            matrix: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
            speed: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
            sun: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`,
            moon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
        };

        const player = videojs('vlc-player', {
            controls: true,
            autoplay: false,
            inactivityTimeout: 1800,
            playbackRates: [0.5, 1, 1.25, 1.5, 2, 2.5, 3],
            userActions: {
                click: false,       // We will manually handle single clicks
                doubleClick: false  // We will manually handle custom double taps
            },
            controlBar: {
                children: [
                    'playToggle',
                    'volumePanel',
                    'currentTimeDisplay',
                    'progressControl',
                    'fullscreenToggle',
                ]
            }
        });

        player.ready(() => {
            const controlBar = player.getChild('controlBar');

            // Move the overlays INSIDE the player element so they render correctly during Fullscreen
            const playerEl = player.el();
            playerEl.appendChild(document.getElementById('sub-settings'));
            playerEl.appendChild(document.getElementById('audio-settings'));

            // Core mechanism overriding VideoJS's handleClick for perfect mobile tap recognition
            const addKeeruBtn = (name, svg, handler, customClass) => {
                const btn = controlBar.addChild('button', { className: `vjs-keeru-btn vjs-control vjs-button ${customClass}`, controlText: name });
                btn.el().innerHTML = `<div class="vjs-icon-placeholder">${svg}</div>`;
                btn.handleClick = () => {
                    handler(btn);
                };
            };

            addKeeruBtn('Rewind', icons.rewind, () => player.currentTime(player.currentTime() - 10), 'vjs-btn-rewind');
            addKeeruBtn('Forward', icons.forward, () => player.currentTime(player.currentTime() + 10), 'vjs-btn-forward');
            
            const divider = controlBar.addChild('component', { className: 'vjs-custom-divider' });
            divider.el().innerHTML = '/';

            addKeeruBtn('Theme', icons.sun, (btn) => {
                document.body.classList.toggle('light-mode');
                const isLight = document.body.classList.contains('light-mode');
                btn.el().innerHTML = `<div class="vjs-icon-placeholder">${isLight ? icons.moon : icons.sun}</div>`;
            }, 'vjs-btn-theme');

            addKeeruBtn('PiP', icons.pip, () => {
                if(document.pictureInPictureElement) document.exitPictureInPicture();
                else player.el().querySelector('video').requestPictureInPicture();
            }, 'vjs-btn-pip');
            addKeeruBtn('Audio', icons.voices, () => togglePanel('audio-settings'), 'vjs-btn-audio');
            addKeeruBtn('Subs', icons.matrix, () => togglePanel('sub-settings'), 'vjs-btn-subs');
            addKeeruBtn('Speed', icons.speed, () => togglePanel('audio-settings'), 'vjs-btn-speed');

            // Set up Auto-Orientation logic
            setupAutoOrientation();
            
            // Setup Unified Tap & Double-Tap Logic
            setupSmartSeeking();
        });

        const UI = {
            splash: document.getElementById('splash-screen'),
            fileInput: document.getElementById('file-input'),
            subInput: document.getElementById('sub-input'),
            selectBtn: document.getElementById('select-btn'),
            topBar: document.getElementById('top-bar'),
            title: document.getElementById('file-title')
        };

        // AUTO-CLOSE PANELS ON MOUSE LEAVE
        document.querySelectorAll('.settings-overlay').forEach(panel => {
            panel.addEventListener('mouseleave', () => {
                panel.classList.remove('active');
            });
        });

        function togglePanel(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const wasActive = el.classList.contains('active');
            document.querySelectorAll('.settings-overlay').forEach(p => p.classList.remove('active'));
            if (!wasActive) { 
                el.classList.add('active'); 
                if (id === 'audio-settings') updateAudioTracks(); 
                if (id === 'sub-settings') updateSubtitleTracks(); 
            }
        }

        // Subtitle Aesthetics Calibration
        function calibrateSubs(size, btn) {
            document.documentElement.style.setProperty('--cue-size', size);
            const btns = btn.parentNode.querySelectorAll('button');
            btns.forEach(b => {
                b.classList.remove('bg-[#4cc9ff]/20', 'text-[#4cc9ff]', 'shadow-[0_0_15px_rgba(76,201,255,0.2)]', 'sub-size-active');
                b.classList.add('hover:bg-white/10');
            });
            btn.classList.remove('hover:bg-white/10');
            btn.classList.add('bg-[#4cc9ff]/20', 'text-[#4cc9ff]', 'shadow-[0_0_15px_rgba(76,201,255,0.2)]', 'sub-size-active');
        }

        function setSubCol(hex, btn) {
            document.documentElement.style.setProperty('--cue-color', hex);
            const btns = btn.parentNode.querySelectorAll('.sub-col-btn');
            btns.forEach(b => {
                b.classList.remove('ring-2', 'ring-[#4cc9ff]', 'ring-offset-2', 'ring-offset-[#0c0c0f]', 'scale-110');
                b.style.boxShadow = 'none';
                b.classList.add('hover:scale-110');
            });
            btn.classList.remove('hover:scale-110');
            btn.classList.add('ring-2', 'ring-[#4cc9ff]', 'ring-offset-2', 'ring-offset-[#0c0c0f]', 'scale-110');
            btn.style.boxShadow = `0 0 15px ${hex}80`;
        }

        function setSpeed(val, btn) {
            player.playbackRate(val);
            const btns = btn.parentNode.querySelectorAll('button');
            btns.forEach(b => {
                b.classList.remove('bg-[#4cc9ff]/20', 'text-[#4cc9ff]', 'shadow-[0_0_15px_rgba(76,201,255,0.2)]');
                b.classList.add('hover:bg-white/10');
            });
            btn.classList.remove('hover:bg-white/10');
            btn.classList.add('bg-[#4cc9ff]/20', 'text-[#4cc9ff]', 'shadow-[0_0_15px_rgba(76,201,255,0.2)]');
        }

        // Dynamic Subtitle Tracks Rendering
        function updateSubtitleTracks() {
            const tracks = player.textTracks();
            const list = document.getElementById('sub-track-list');
            list.innerHTML = '';
            
            const offBtn = document.createElement('div');
            let anyShowing = Array.from(tracks).some(t => t.kind === 'subtitles' && t.mode === 'showing');
            offBtn.className = `flex items-center gap-3 p-3 rounded-2xl hover:bg-white/10 cursor-pointer transition-all ${!anyShowing ? 'border border-[#4cc9ff]/30 bg-[#4cc9ff]/5 shadow-[0_0_15px_rgba(76,201,255,0.1)]' : 'border border-white/5 bg-white/5'}`;
            offBtn.innerHTML = `
                <div class="w-2 h-2 rounded-full ${!anyShowing ? 'bg-[#4cc9ff] shadow-[0_0_8px_#4cc9ff]' : 'bg-zinc-600'}"></div>
                <span class="text-[10px] font-bold ${!anyShowing ? 'text-[#4cc9ff]' : 'text-zinc-400'}">Subtitles Disabled</span>
            `;
            offBtn.onclick = () => {
                for (let i = 0; i < tracks.length; i++) {
                    if (tracks[i].kind === 'subtitles' || tracks[i].kind === 'captions') tracks[i].mode = 'disabled';
                }
                updateSubtitleTracks();
            };
            list.appendChild(offBtn);

            let hasSubs = false;
            for (let i = 0; i < tracks.length; i++) {
                if (tracks[i].kind === 'subtitles' || tracks[i].kind === 'captions') {
                    hasSubs = true;
                    const isShowing = tracks[i].mode === 'showing';
                    const btn = document.createElement('div');
                    btn.className = `flex items-center justify-between p-3 rounded-2xl hover:bg-white/10 cursor-pointer transition-all mt-2 ${isShowing ? 'border border-[#4cc9ff]/50 bg-[#4cc9ff]/10 shadow-[0_0_15px_rgba(76,201,255,0.15)]' : 'border border-white/5 bg-white/5'}`;
                    btn.innerHTML = `
                        <div class="flex items-center gap-3 truncate pr-2">
                            <div class="w-2 h-2 rounded-full flex-shrink-0 ${isShowing ? 'bg-[#4cc9ff] shadow-[0_0_8px_#4cc9ff]' : 'bg-zinc-600'}"></div>
                            <span class="text-[10px] font-bold truncate ${isShowing ? 'text-[#4cc9ff]' : 'text-zinc-300'}">${tracks[i].label || 'Track ' + (i+1)}</span>
                        </div>
                        <span class="text-[8px] font-black opacity-40 uppercase flex-shrink-0">${tracks[i].language || 'EXT'}</span>
                    `;
                    btn.onclick = () => {
                        for (let j = 0; j < tracks.length; j++) {
                            if (tracks[j].kind === 'subtitles' || tracks[j].kind === 'captions') {
                                tracks[j].mode = (i === j) ? 'showing' : 'disabled';
                            }
                        }
                        updateSubtitleTracks();
                    };
                    list.appendChild(btn);
                }
            }
        }

        function updateAudioTracks() {
            const tracks = player.audioTracks();
            const list = document.getElementById('audio-track-list');
            if (tracks.length > 1) {
                list.innerHTML = '';
                for (let i = 0; i < tracks.length; i++) {
                    const btn = document.createElement('div');
                    btn.className = `flex items-center justify-between p-4 rounded-2xl hover:bg-white/5 cursor-pointer border ${tracks[i].enabled ? 'border-[#4cc9ff]/50 bg-[#4cc9ff]/10 shadow-[0_0_15px_rgba(76,201,255,0.15)]' : 'border-white/5 bg-white/5'} mt-2 transition-all`;
                    btn.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full ${tracks[i].enabled ? 'bg-[#4cc9ff] shadow-[0_0_8px_#4cc9ff]' : 'bg-zinc-600'}"></div>
                            <span class="text-[11px] font-bold ${tracks[i].enabled ? 'text-[#4cc9ff]' : 'text-zinc-300'}">Stream ${i+1}</span>
                        </div>
                        <span class="text-[9px] font-black opacity-40 uppercase">${tracks[i].language || 'PCM'}</span>`;
                    btn.onclick = () => { for (let j = 0; j < tracks.length; j++) tracks[j].enabled = (i === j); updateAudioTracks(); };
                    list.appendChild(btn);
                }
            }
        }

        function handleFiles(files) {
            const list = Array.from(files);
            const video = list.find(f => f.type.startsWith('video/') || f.name.match(/\.(mkv|mp4|webm|avi|mov)$/i));
            const subs = list.filter(f => f.name.match(/\.(srt|vtt)$/i));
            if (video) {
                const url = URL.createObjectURL(video);
                player.src({ type: video.type || 'video/mp4', src: url });
                UI.title.textContent = video.name.toUpperCase();
                UI.splash.style.opacity = '0';
                setTimeout(() => { UI.splash.style.display = 'none'; UI.topBar.classList.remove('opacity-0'); }, 1000);
                player.ready(() => player.play());
            }
            subs.forEach(loadSubtitle);
        }

        async function loadSubtitle(file) {
            const text = await file.text();
            let vtt = "WEBVTT\n\n";
            if (file.name.toLowerCase().endsWith('.srt') || !text.includes('WEBVTT')) {
                vtt += text.replace(/(\d+:\d+:\d+),(\d+)/g, '$1.$2');
            } else { vtt = text; }
            const blob = new Blob([vtt], { type: 'text/vtt' });
            const track = player.addRemoteTextTrack({ kind: 'subtitles', srclang: 'en', label: file.name, src: URL.createObjectURL(blob) }, true);
            setTimeout(() => { 
                track.track.mode = 'showing'; 
                if(document.getElementById('sub-settings').classList.contains('active')) updateSubtitleTracks();
            }, 400);
        }

        // Auto-Orientation Hardware Detection
        function setupAutoOrientation() {
            const handleOrientationChange = () => {
                if (!player) return;
                const isLandscape = window.matchMedia("(orientation: landscape)").matches;
                
                try {
                    if (isLandscape && !player.isFullscreen()) {
                        player.requestFullscreen().catch(e => console.log('Auto-fullscreen blocked without user gesture.'));
                    } else if (!isLandscape && player.isFullscreen()) {
                        player.exitFullscreen().catch(e => console.log('Exit fullscreen error.'));
                    }
                } catch (err) {}
            };

            window.addEventListener("orientationchange", handleOrientationChange);
            if (screen.orientation) {
                screen.orientation.addEventListener("change", handleOrientationChange);
            }
        }
        
        // Smart Single-Tap & Double-Tap Logic
        function setupSmartSeeking() {
            let lastTap = 0;
            let tapTimeout;
            let isSwiping = false;
            let touchHandled = false;

            function triggerSeekFeedback(side) {
                const el = document.getElementById(`seek-fb-${side}`);
                el.style.opacity = '1';
                
                if (side === 'center') {
                    el.style.transform = 'translate(-50%, -50%) scale(1.1)';
                } else {
                    el.style.transform = 'translateY(-50%) scale(1.1)';
                }
                
                clearTimeout(el.fbTimeout);
                el.fbTimeout = setTimeout(() => {
                    el.style.opacity = '0';
                    if (side === 'center') {
                        el.style.transform = 'translate(-50%, -50%) scale(0.9)';
                    } else {
                        el.style.transform = 'translateY(-50%) scale(0.9)';
                    }
                }, 400);
            }

            const tapTarget = player.el();

            // Detect swipes so we don't accidentally tap when user is scrolling the page
            tapTarget.addEventListener('touchstart', () => { isSwiping = false; }, { passive: true });
            tapTarget.addEventListener('touchmove', () => { isSwiping = true; }, { passive: true });

            const processTap = (e) => {
                // Ignore if it was a swipe gesture
                if (e.type.includes('touch') && isSwiping) return;

                // Prevent intercepting clicks inside menus or control bars
                if (e.target.closest('.vjs-control-bar') || e.target.closest('.settings-overlay') || e.target.closest('#top-bar') || e.target.closest('button')) return;

                // Do not trigger video actions if the user just clicked to close an open settings menu
                const isOverlayActive = Array.from(document.querySelectorAll('.settings-overlay')).some(el => el.classList.contains('active'));
                if (isOverlayActive) return;

                const now = Date.now();
                const tapDiff = now - lastTap;
                
                const rect = tapTarget.getBoundingClientRect();
                
                // Get precise coordinates regardless of mouse vs touch
                let clientX;
                if (e.type.includes('touch')) {
                    clientX = e.changedTouches[0].clientX;
                    touchHandled = true;
                } else {
                    if (touchHandled) {
                        touchHandled = false; // Reset flag and abort duplicate event
                        return;
                    }
                    clientX = e.clientX;
                }
                        
                const x = clientX - rect.left;
                const width = rect.width;

                // --- MIDDLE ZONE (33% to 66%) - INSTANT SINGLE TAP PLAY/PAUSE ---
                if (x > width * 0.33 && x < width * 0.66) {
                    if(e.cancelable && e.type.includes('touch')) e.preventDefault();
                    clearTimeout(tapTimeout);
                    lastTap = 0; // Prevent interfering with side taps by resetting
                    
                    if (player.paused()) {
                        player.play();
                        document.getElementById('fb-play-icon').classList.remove('hidden');
                        document.getElementById('fb-pause-icon').classList.add('hidden');
                    } else {
                        player.pause();
                        document.getElementById('fb-play-icon').classList.add('hidden');
                        document.getElementById('fb-pause-icon').classList.remove('hidden');
                    }
                    triggerSeekFeedback('center');
                    return;
                }

                // --- SIDE ZONES (<33% or >66%) - DOUBLE TAP SEEK ---
                if (tapDiff > 0 && tapDiff < 300) {
                    // DOUBLE TAP Confirmed
                    if(e.cancelable && e.type.includes('touch')) e.preventDefault();
                    clearTimeout(tapTimeout); 
                    
                    if (x <= width * 0.33) {
                        player.currentTime(Math.max(0, player.currentTime() - 5));
                        triggerSeekFeedback('left');
                    } else if (x >= width * 0.66) {
                        player.currentTime(Math.min(player.duration(), player.currentTime() + 5));
                        triggerSeekFeedback('right');
                    }
                    lastTap = 0;
                } else {
                    // SINGLE TAP (Wait to confirm it's not a double tap)
                    lastTap = now;
                    tapTimeout = setTimeout(() => {
                        // Toggle UI visibility for side single-taps
                        player.userActive(!player.userActive());
                    }, 300);
                }
            };

            // Use touchend for precise mobile taps, and click for everything else
            tapTarget.addEventListener('touchend', processTap, { passive: false });
            tapTarget.addEventListener('click', processTap);
        }

        UI.selectBtn.onclick = () => UI.fileInput.click();
        UI.fileInput.onchange = (e) => handleFiles(e.target.files);
        UI.subInput.onchange = (e) => { if (e.target.files[0]) loadSubtitle(e.target.files[0]); };

        player.on('useractive', () => UI.topBar.classList.remove('opacity-0'));
        player.on('userinactive', () => { if(!player.paused()) UI.topBar.classList.add('opacity-0'); });
        
        // Touch/click detection to close panels when interacting elsewhere
        player.on(['click', 'touchend'], (e) => {
            if (e.target.tagName !== 'BUTTON' && !e.target.closest('.settings-overlay') && !e.target.closest('.vjs-keeru-btn')) {
                document.querySelectorAll('.settings-overlay').forEach(p => p.classList.remove('active'));
            }
        });

        document.addEventListener('keydown', (e) => {
            if(!player.src()) return;
            const key = e.key.toLowerCase();
            
            if (e.code === 'Space') {
                e.preventDefault();
                player.paused() ? player.play() : player.pause();
            }
            if (key === 's') {
                const tracks = Array.from(player.textTracks()).filter(t => t.kind === 'subtitles' || t.kind === 'captions');
                if (tracks.length > 0) {
                    let current = tracks.findIndex(t => t.mode === 'showing');
                    let next = (current + 1) >= tracks.length ? -1 : (current + 1);
                    tracks.forEach((t, i) => t.mode = (i === next ? 'showing' : 'disabled'));
                    if(document.getElementById('sub-settings').classList.contains('active')) updateSubtitleTracks();
                } else {
                    document.getElementById('sub-input').click();
                }
            }
            if (key === 'f') {
                if (player.isFullscreen()) { player.exitFullscreen(); } else { player.requestFullscreen(); }
            }
            
            if (e.code === 'ArrowUp') {
                e.preventDefault();
                player.volume(Math.min(1, player.volume() + 0.1));
            }
            if (e.code === 'ArrowDown') {
                e.preventDefault();
                player.volume(Math.max(0, player.volume() - 0.1));
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                player.currentTime(player.currentTime() + 5);
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                player.currentTime(player.currentTime() - 5);
            }
        });

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); });
    </script>
</body>
</html>
